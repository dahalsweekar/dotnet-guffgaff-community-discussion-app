<div class="dialog-title-bar" [ngClass]="data.type">
  <mat-icon class="dialog-icon">
    {{ getIconForType(data.type) }}
  </mat-icon>
  <h2 class="dialog-title" style="font-size:13px;">{{ data.title }}</h2>
  <button mat-icon-button (click)="onCancel()" *ngIf="data.showCancel">
    <mat-icon>close</mat-icon>
  </button>
</div>

<mat-dialog-content>
  <p style="font-size:11px;">{{ data.message }}</p>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-flat-button color="primary" (click)="onConfirm()">
    <mat-icon>check_circle</mat-icon>{{ data.confirmText || 'OK' }}
  </button>
  <button mat-stroked-button color="warn" *ngIf="data.showCancel" (click)="onCancel()">
    <mat-icon>cancel</mat-icon>{{ data.cancelText }}
  </button>
</mat-dialog-actions>
