@if (currentPostId == 0) {
  <div class="container-unposted">

    <h2>Post Your Thought</h2>

    <!-- Title -->
    <mat-form-field appearance="fill" class="full-width">
      <mat-label>Title</mat-label>
      <input matInput [(ngModel)]="post.Title" placeholder="Title..." />
    </mat-form-field>

    <!-- Description -->
    <mat-form-field appearance="fill" class="full-width">
      <mat-label>Description</mat-label>
      <textarea matInput [(ngModel)]="post.Description" rows="4" placeholder="Write your thought here..."></textarea>
    </mat-form-field>

    <!-- Category -->
    <mat-form-field appearance="fill" class="full-width">
      <mat-label>Category</mat-label>
      <input matInput [(ngModel)]="post.Category" placeholder="Tag" />
    </mat-form-field>

    <!-- Submit Button -->
    <button mat-raised-button color="primary" (click)="putPost()">Post</button>

  </div>
} @else {
  <div class="container-posted">

    <!-- Title -->
    <h3 id="post-title-p">{{ post.Title }}</h3>

    <!-- Description -->
    <p id="post-description-p">{{ post.Description }}</p>

    <!-- Voting Buttons -->
    <div class="up-down-votebtns">
      <button mat-stroked-button color="primary" (click)="updateVote(1)">Upvote</button>
      <button mat-stroked-button color="warn" (click)="updateVote(-1)">Downvote</button>
    </div>

  </div>
}
