<div class="main-container">
  <div class="post-container">
      @if (currentPostId == '0')
      {
        <div class="reddit-post-form">
          <h3>Create a New Post</h3>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Title</mat-label>
            <input matInput [(ngModel)]="post.Title" placeholder="What's on your mind?" />
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Description</mat-label>
            <textarea matInput [(ngModel)]="post.Description" draggable="false" placeholder="Your thoughts..." rows="5"></textarea>
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Category (Subreddit)</mat-label>
            <input matInput [(ngModel)]="post.Category" placeholder="e.g. Angular, Gaming..." />
          </mat-form-field>

          <button mat-raised-button color="primary" (click)="putPost()">Post</button>
        </div>
      }
      @else
      {
        <div class="reddit-post-display">
          <div class="vote-column">
            <button mat-icon-button (click)="updateVote(1)">
              <mat-icon>arrow_upward</mat-icon>
            </button>
            <div class="vote-count">{{ post.UpVotes }}</div>
            <button mat-icon-button (click)="updateVote(-1)">
              <mat-icon>arrow_downward</mat-icon>
            </button>
            <div class="vote-count">{{ post.DownVotes }}</div>
          </div>

          <div class="post-content">
            <h2 class="post-title">{{ post.Title }}</h2>
            <p class="post-meta">
              Posted by u/{{ post.Owner }} • {{ post.PostedDate | date:'short' }} • r/{{ post.Category }}
            </p>
            <p class="post-description">{{ post.Description }}</p>
          </div>
        </div>
      }
  </div>
  <!-- <div class="AI-container">

  </div> -->
</div>
