<div class="container">
    <div class="comment-btn">
        <button type="button" (click)="addComment()">Comment</button>
    </div>
    @if (IsCommentAreaVisible){
    <div class="comment-area">
        <textarea [(ngModel)]="comment.commentDescription" rows="4" cols="50" placeholder="Comment..."></textarea>
        <button type="button" (click)="saveComment()">Save</button>
        <button type="button" (click)="cancelComment()">Cancel</button>
    </div>
    }

    </div>
