<div class="chat-container">
  <div class="chat-box">
    @for(msg of chatHistory; track msg){
    <div class="chat-message" [ngClass]="msg.sender">
        <strong>{{ msg.sender }}:</strong> {{ msg.message }}
        </div>
    }
  </div>
  <div class="message-container" style="display: flex;">
        <div class="chat-input">
            <input class="message-input-box" [(ngModel)]="userInput" (keyup.enter)="sendMessage()" placeholder="Type your message..." />
        </div>
        <div class="send-btn" style="margin: 5px; margin-top: 15px;">
            <button mat-raised-button (click)="sendMessage()">Send</button>
        </div>
  </div>
 
</div>
