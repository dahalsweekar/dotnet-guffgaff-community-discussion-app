<div class="chat-container">
    <h3>FREE Bot</h3>
  <div class="chat-box">
    @for(msg of chatHistory; track msg){
    <div class="chat-card" [ngClass]="msg.sender">
        <div class="message-content">
            <strong>{{ msg.sender }}:</strong> {{ msg.message }}
        </div>
        </div>
    }
  </div>
  <div class="message-container" style="display: flex; margin-top:10px;">
        <mat-form-field appearance="outline" class="small full-width">
            <input matInput class="message-input-box" [disabled]="isLoading" [(ngModel)]="userInput" (keyup.enter)="sendMessage()" placeholder="Type your message..." />
        </mat-form-field>
            <button mat-flat-button [disabled]="isLoading" (click)="sendMessage()" style="margin-left: 5px;"><mat-icon>send</mat-icon>
                @if (isLoading){
                    <ng-container>
                        <img src="assets/loading.gif" alt="Loading..." style="height: 25px; width: 25px;" />
                    </ng-container>
                }
                @else {
                    <ng-container><span>{{ Status }}</span></ng-container>
                }
            </button>
  </div>
</div>
