@if (!isLoggedIn){
    <div>
      <button (click)="login()">Login</button>
    </div>
}
@else{
<div>
      <p>Welcome, {{ user?.userId }}</p>
      <p>Email: {{ user?.email }}</p>
      @if (user?.picture){
        <img [src]="user?.picture" alt="Profile Picture" width="100" />
      }
      <button (click)="logout()">Logout</button> 
</div>
}
