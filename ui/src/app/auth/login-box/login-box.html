<div class="container">
  <div class="sub-container">
    <div class="heading" style="margin-bottom: 30px;">
    <h2>Login</h2>
  </div>

  <div class="fields">

    <div class="userinp">
      <mat-form-field appearance="outline" class="small">
        <mat-label>Email</mat-label>
        <input matInput [(ngModel)]="user.Email" placeholder="Enter your username">
      </mat-form-field>
    </div>

    <div class="passinp">
      <mat-form-field appearance="outline" class="small">
        <mat-label>Password</mat-label>
        <input matInput [(ngModel)]="user.Password" type="password" placeholder="Enter your password">
      </mat-form-field>
    </div>

    <div class="loginbtn">
      <button mat-flat-button color="primary" style="margin: 2px;" class="login-btn" (click)="login()">Login</button>
      <button mat-stroked-button color="warn" style="margin: 2px;" class="cancel-btn" (click)="cancel()">Cancel</button>
    </div>
    <div class="forgot-password" style="margin-top:10px;">
      <label class="forgot-password-link" style="color: #888; padding-top:10px; margin-left:50px;" (click)="openForgotPassword()">Forgot Password?</label>
    </div>
  </div>

  <div class="login-mit-google">
    <button mat-stroked-button color="primary" style="width: 100%;" class="signup-btn" (click)="signup()">Sign up with Google</button>
  </div>
  </div>
</div>
