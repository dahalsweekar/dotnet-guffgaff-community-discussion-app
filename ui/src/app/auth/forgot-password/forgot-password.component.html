<div class="forgot-password-container">
  <div class="forgot-password-card mat-elevation-z4">
    <div class="forgot-password">
      <div class="title">
          <h2>Forgot Password</h2>
      </div>
      <div class="row">
          <mat-form-field appearance="outline" class="small full-width">
            <mat-label>Email</mat-label>
            <input matInput [(ngModel)]="Email" placeholder="Enter your email" type="email" required>
          </mat-form-field>
      </div>
      <div class="buttons">
        <mat-dialog-actions align="end">
          <button mat-flat-button color="primary" (click)="validateCredentials()" [disabled]="this.isSent"><mat-icon>mail</mat-icon>
            @if(isSent){
              <ng-container>
                  <img src="assets/loading.gif" alt="Loading..." style="height: 25px; width: 25px;" />
              </ng-container>
            }
            @else{ Send }
        </button>
          <button mat-stroked-button color="warn" (click)="onCancelClick()" [disabled]="isSent"><mat-icon>cancel</mat-icon>Cancel</button>
        </mat-dialog-actions>
      </div>
    </div>
  </div>
</div>
