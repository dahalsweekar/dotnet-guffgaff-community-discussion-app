<div class="main-container">
<div class="container">
    <div class="sub-container">
<div class="header">
        <h2 style="margin: 10px;">Create Profile</h2>
    </div>
    <div class="fields">
        <div class="email">
         <mat-form-field appearance="outline" class="small">
         <mat-label>Email</mat-label>
        <input matInput [(ngModel)]="user.Email" [disabled]="true">
        </mat-form-field>
         </div>
        <div class="nickname">
         <mat-form-field appearance="outline" class="small">
         <mat-label>Nickname*</mat-label>
        <input matInput [(ngModel)]="user.Name" placeholder="Enter your username" (keyup)="onNameChange()">
        @if (isNameValid){
            <mat-hint>
                <mat-icon style="color: green;">check_circle</mat-icon>
                <span style="font-style: italic;"> Username available</span>
            </mat-hint>
         }
         @else {
            <mat-hint>
                <mat-icon style="color: red;">cancel</mat-icon>
                <span style="font-style: italic;"> Username not available</span>
            </mat-hint>
         }
        </mat-form-field>
        <div class="valid-label">
            
        </div>
        </div>

        <div class="pass1" style="margin-top: 8px;">
            <mat-form-field appearance="outline" class="small">
            <mat-label>Password*</mat-label>
            <input matInput [(ngModel)]="user.Password" type="password" placeholder="Enter your password">
      </mat-form-field>
        </div>
        <div class="pass2">
            <mat-form-field appearance="outline" class="small">
            <mat-label>Confirm Password*</mat-label>
            <input matInput [(ngModel)]="ConfirmPassword" type="password" placeholder="Enter your password">
      </mat-form-field>
        </div>
        <div class="profile-pic">

        </div>
    </div>
    <div class="btn">
        <div class="create-btn" style="margin: 5px;">
            <button mat-flat-button color="primary" class="create-btn" (click)="create()">Create Profile</button>
        </div>
        <div class="cancel-btn" style="margin: 5px;">
            <button mat-stroked-button color="warn" class="cancel-btn" (click)="cancel()">Cancel</button>
        </div>
    </div>
    </div>
</div>
</div>
